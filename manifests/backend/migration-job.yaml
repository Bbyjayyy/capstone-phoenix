apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: taskapp
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: ghcr.io/ts-a-devops/taskapp-backend:latest
          command: ["sh", "-c"]
          args:
            - flask db upgrade
          envFrom:
            - secretRef:
                name: taskapp-secret
