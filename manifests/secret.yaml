apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secret
  namespace: taskapp
type: Opaque
stringData:
  POSTGRES_USER: taskapp
  POSTGRES_PASSWORD: ChangeMeStrongPassword123
  POSTGRES_DB: taskapp

  DATABASE_HOST: postgres.taskapp.svc.cluster.local
