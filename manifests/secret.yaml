  DATABASE_URI: postgresql://taskapp:ChangeMeStrongPassword123@postgres.taskapp.svc.cluster.local:5432/taskapp
  SQLALCHEMY_DATABASE_URI: postgresql://taskapp:ChangeMeStrongPassword123@postgres.taskapp.svc.cluster.local:5432/taskapp
